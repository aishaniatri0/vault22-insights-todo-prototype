<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Insights &amp; To-Do | Vault22</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-logo"><img src="assets/img/vault22-logo.png" alt="Vault22"></div>
  <div class="hdr-right">
    <!-- The bell now goes somewhere. It used to carry a hardcoded "8" and do
         nothing when clicked; the count is the real number of open to-dos and it
         opens the list, so the badge and the click both mean something. -->
    <a class="bell" id="bell" href="#/todo" aria-label="Your to-do list">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/>
      </svg>
      <span class="badge" id="bell-badge" hidden>0</span>
    </a>
    <!-- Display only. These mirror the live app's chrome but this prototype does
         not switch currency, region or user, so they are no longer buttons with a
         chevron promising a menu that never opens. -->
    <span class="pill pill-static"><strong>R</strong> ZAR</span>
    <span class="pill pill-static">
      <span class="flags" aria-hidden="true"><span>🇿🇦</span><span>🇺🇸</span><span>🇮🇳</span></span> 3 regions
    </span>
    <span class="pill pill-static">
      <span class="av-sm" aria-hidden="true">n</span> ngandev0309
    </span>
  </div>
</header>

<div class="shell" id="app-shell">
  <aside class="side">
    <div class="side-top">
      <h2>Menu</h2>
      <button class="side-collapse" aria-label="Collapse menu">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main class="main">
    <div class="crumb">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v10a2 2 0 01-2 2H5a2 2 0 01-2-2V10z"/></svg>
      <a href="#/insights">Home</a> <span>/</span> <span id="crumb-leaf">Insights</span>
    </div>

    <div id="view"></div>

    <div class="page-support">
      <a href="mailto:support@vault22.com">✉ Need Help? Contact support</a>
    </div>
  </main>
</div>

<footer class="ftr">
  <img src="assets/img/vault22-logo.png" alt="Vault22">
  <a class="support" href="mailto:support@vault22.com">✉ Need Help? Contact support</a>
  <!-- Decorative only: these are not links in this prototype, and as bare glyphs
       they were read out as things like "mathematical double-struck capital x". -->
  <div class="socials" aria-hidden="true">in &nbsp; 𝕏 &nbsp; f &nbsp; ◎ &nbsp; ♪ &nbsp; ▶</div>
</footer>

<!-- Tara, exactly as the live app: a floating avatar bottom right -->
<button class="tara-fab" id="tara-fab" aria-label="Tara AI">
  <img src="assets/img/tara-advisor.png" alt="Tara">
  <span class="tara-dot"></span>
</button>

<div class="scrim" id="scrim"></div>
<!-- inert/hidden while closed. This was previously always present and always
     exposed, so its Close button sat in the tab order of every page and screen
     readers heard a modal dialog asserted over the whole app at all times. -->
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title" inert hidden>
  <div class="drawer-hd">
    <h2 id="drawer-title"></h2>
    <button id="drawer-x" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-bd" id="drawer-bd"></div>
</aside>

<div class="modal-wrap" id="modal-wrap" inert hidden>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-hd">
      <h2 id="modal-title"></h2>
      <button id="modal-x" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-bd" id="modal-bd"></div>
  </div>
</div>

<!-- Announced to screen readers. Every confirmation and validation message goes
     through here, and none of it used to reach assistive tech at all. -->
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
